# ============================================
# APPLICATION SETTINGS
# ============================================
spring.application.name=Organ Donation System
server.port=8081

# ============================================
# DATABASE CONFIGURATION (MySQL)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/organ_donation_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Pratu@2968
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# HIBERNATE / JPA SETTINGS
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# JSP VIEW RESOLVER
# ============================================
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
server.servlet.jsp.init-parameters.development=true

# ============================================
# SECURITY SETTINGS
# ============================================
app.jwt.secret=OrganDonationSystemSecretKey2024VeryLongSecretKeyForJWT
app.jwt.expiration=86400000

# ============================================
# FILE UPLOAD SETTINGS
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# EMAIL SETTINGS (Mock - Console Logging)
# ============================================
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=

# ============================================
# INTERNATIONALIZATION
# ============================================
spring.messages.basename=messages
spring.messages.default-locale=en

# ============================================
# LOGGING
# ============================================
logging.level.com.organdonation=DEBUG
logging.level.org.springframework.security=INFO
